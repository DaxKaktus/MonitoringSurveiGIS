<script>
function loadPetugasUpdate() {
  const select = document.getElementById('upd_namaPetugas');
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data || data.length === 0) {
        select.innerHTML = '<option value="">-- Data Tidak Dapat Dimuat, Pastikan Koneksi Internet Anda Stabil --</option>';
        return;
      }
      listPetugas = data;
      
      // Mengambil daftar nama unik saja untuk dropdown petugas
      let namaUnik = [...new Set(data.map(p => p.nama))];
      
      select.innerHTML = '<option value="">-- Pilih Nama PCL --</option>';
      namaUnik.forEach(nama => {
        let opt = document.createElement('option');
        opt.value = opt.innerText = nama;
        select.appendChild(opt);
      });
    })
    .getDaftarPetugas();
}

  function isiIdUpdate() {
  const nama = document.getElementById('upd_namaPetugas').value;
  const p = listPetugas.find(x => x.nama === nama );
  
  if (p) {
    document.getElementById('upd_idPetugas').value = p.id;
    // Reset wilayah jika ganti petugas agar tidak salah data
    document.getElementById('upd_kecamatan').selectedIndex = 0;
    document.getElementById('upd_wilayah').innerHTML = '<option value="">-- Pilih Desa --</option>';
    document.getElementById('upd_sls').value = "";
  }
}
// Fungsi untuk sinkronisasi dropdown (Sama dengan form.html Anda)
function loadWilayahUpdate() {
  const kec = document.getElementById('upd_kecamatan').value;
    const desSel = document.getElementById('upd_wilayah');
    desSel.innerHTML = '<option value="">-- Pilih Desa --</option>';
    if (mappingWilayah[kec]) {
      mappingWilayah[kec].forEach(d => {
        let opt = document.createElement('option');
        opt.value = d;
        opt.innerText = d;
        desSel.appendChild(opt);
      });
    }
    document.getElementById('upd_sls').value = "";
  document.getElementById('upd_namaKRT').innerHTML = '<option value="">-- Pilih Desa dahulu --</option>';
  }

function loadSLSUpdate() {
  const nama = document.getElementById('upd_namaPetugas').value;
  const desa = document.getElementById('upd_wilayah').value;
  const slsSel = document.getElementById('upd_sls');
  slsSel.innerHTML = '<option value="">-- Pilih SLS --</option>';
  
  if (nama && desa) {
    const matches = listPetugas.filter(p => 
      p.nama.trim().toUpperCase() === nama.trim().toUpperCase() && 
      p.desa.trim().toUpperCase() === desa.trim().toUpperCase()
    );

    if (matches.length > 0) {
      // SLS tetap dibuat unik agar tidak muncul double jika baris KRT banyak
      let slsUnik = [...new Set(matches.map(m => m.sls.toString().trim()))];
      
      slsUnik.forEach(s => {
        let opt = document.createElement('option');
        opt.value = opt.innerText = s;
        slsSel.appendChild(opt);
      });

      if (slsUnik.length === 1) {
        slsSel.value = slsUnik[0];
        loadKRTUpdate();
      }
    }
  }
}

  function loadKRTUpdate() {
  const kec = document.getElementById('upd_kecamatan').value;
  const desa = document.getElementById('upd_wilayah').value;
  const sls = document.getElementById('upd_sls').value;
  
  if (kec && desa && sls) {
    loadListKRT(kec, desa, sls);
  }else {
    document.getElementById('upd_namaKRT').innerHTML = '<option value="">-- Pilih SLS dahulu --</option>';
  }
}

function loadListKRT(kec, desa, sls) {
  const krtSel = document.getElementById('upd_namaKRT');
  krtSel.innerHTML = '<option value="">-- Memuat Nama KRT... --</option>';

  google.script.run
    .withSuccessHandler(function(data) {
      if (data && data.length > 0) {
        krtSel.innerHTML = '<option value="">-- Pilih Nama KRT --</option>';
        data.forEach(item => {
          let opt = document.createElement('option');
          opt.value = item.nama; 
          opt.innerText = item.nama;
          krtSel.appendChild(opt);
        });
      } else {
        krtSel.innerHTML = '<option value="">-- Nama KRT tidak ditemukan --</option>';
      }
    })
    .getDaftarPetugas(kec, desa, sls);
}

function previewFotoBaru(input) {
  const preview = document.getElementById('upd_preview_baru');
  const container = document.getElementById('upd_new_preview_container');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      container.style.display = 'block';
    }
    reader.readAsDataURL(input.files[0]);
  }
}

function prosesCariData() {
  const dataCari = {
    emailManual : document.getElementById('upd_emailManual').value,
    namaPcl: document.getElementById('upd_namaPetugas').value,
    kec: document.getElementById('upd_kecamatan').value,
    desa: document.getElementById('upd_wilayah').value,
    sls: document.getElementById('upd_sls').value,
    namaKrt: document.getElementById('upd_namaKRT').value
  };

  if(!dataCari.namaKrt) {
    Swal.fire('Peringatan', 'Lengkapi semua kriteria pencarian!', 'warning');
    return;
  }

  Swal.fire({
    title: 'Mencari Data...',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run.withSuccessHandler(res => {
    Swal.close();
    if(res) {
      // Tampilkan Section Edit, Sembunyikan Section Cari
      document.getElementById('sectionCariUpdate').style.display = 'none';
      document.getElementById('sectionFormEdit').style.display = 'block';

      // MENGISI INFORMASI WAKTU UPDATE (KOLOM Z/26)
      
      
      // Isi semua data ke Form Edit
      document.getElementById('upd_rowIndex').value = res.rowIndex;
      document.getElementById('upd_namaKRT_Final').value = dataCari.namaKrt;
      document.getElementById('upd_pendidikanKRT').value = res.pendidikanKRT;
      document.getElementById('upd_pekerjaanKRT').value = res.pekerjaanKRT;
      document.getElementById('upd_jumlahART').value = res.jumlahART;
      document.getElementById('upd_pendapatan').value = res.pendapatan;
      document.getElementById('upd_makan').value = res.makan;
      document.getElementById('upd_nonMakan').value = res.nonMakan;
      document.getElementById('upd_catatan').value = res.catatan;


      // 3. --- PERBAIKAN LOGIKA BANSOS ---
      const checkboxes = document.querySelectorAll('#sectionFormEdit input[name="bansos"]');
      
      // RESET TOTAL: Paksa semua checkbox jadi tidak tercentang (Uncheck All)
      checkboxes.forEach(cb => {
        cb.checked = false; 
      });

      if (res.bansos && res.bansos !== "") {
        // Gunakan REGEX untuk split: memotong berdasarkan koma, 
        // mengabaikan ada atau tidaknya spasi (PKH, BPNT atau PKH,BPNT tetap terbaca)
        const bansosTerpilih = res.bansos.split(/\s*,\s*/); 
        
        checkboxes.forEach(cb => {
          if (bansosTerpilih.includes(cb.value)) {
            cb.checked = true;
          }
        });
      }

      if (res.fotoUrl && res.fotoUrl !== "Tidak ada foto") {
      document.getElementById('upd_preview_lama').src = res.fotoUrl;
      document.getElementById('upd_preview_lama').style.display = 'block';
      document.getElementById('no_foto_msg').style.display = 'none';
      } else {
      document.getElementById('upd_preview_lama').style.display = 'none';
      document.getElementById('no_foto_msg').style.display = 'block';
      } 
    } else {
      Swal.fire('Data Tidak Ada', 'Maaf, data tidak ditemukan di server.', 'warning');
    }
    })
    .withFailureHandler(err => { // Tambahkan failure handler untuk cek error server
      Swal.close();
      Swal.fire('Error Server', err.message, 'error');
  }).searchSurveyData(dataCari.namaPcl, dataCari.kec, dataCari.desa, dataCari.sls, dataCari.namaKrt);
}

// 2. Fungsi Simpan Update
function prosesUpdate() {
  const fileInput = document.getElementById('upd_fotoInput');

  // AMBIL SEMUA NILAI CHECKBOX YANG DICENTANG
  const bansosChecked = [];
  const currentCheckboxes = document.querySelectorAll('#sectionFormEdit input[name="bansos"]:checked');
  currentCheckboxes.forEach(cb => {
    bansosChecked.push(cb.value);
  });
  const bansosString =  bansosChecked.join(', ') ;
  
  const kirimKeServer = (fotoBase64 = null) => {  

  const dataUpdate = {
    rowIndex: document.getElementById('upd_rowIndex').value,
    pendidikanKRT: document.getElementById('upd_pendidikanKRT').value,
    pekerjaanKRT: document.getElementById('upd_pekerjaanKRT').value,
    jumlahART: document.getElementById('upd_jumlahART').value,
    pendapatan: document.getElementById('upd_pendapatan').value,
    makan: document.getElementById('upd_makan').value,
    nonMakan: document.getElementById('upd_nonMakan').value,
    bansos: bansosString,
    fotoFile: fotoBase64,
    catatan: document.getElementById('upd_catatan').value
  };

  Swal.fire({
    title: 'Memproses Update...',
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run.withSuccessHandler(res => {
    Swal.fire('Berhasil!', 'Data telah diperbarui.', 'success').then(() => {
      resetHalamanUpdate();
      bukaHalaman('halamanMenu');
    });
  }).updateForm(dataUpdate);
};

// LOGIKA CEK FOTO
  if (fileInput && fileInput.files.length > 0) {
    // Jika ada foto, baca dulu baru kirim
    const reader = new FileReader();
    reader.onload = function(e) {
      kirimKeServer(e.target.result);
    };
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    // Jika tidak ada foto baru, langsung kirim
    kirimKeServer(null);
  }
}

function resetHalamanUpdate() {
  document.getElementById('sectionCariUpdate').style.display = 'block';
  document.getElementById('sectionFormEdit').style.display = 'none';
}
</script>
