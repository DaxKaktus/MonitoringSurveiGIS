    console.log("Data draft berhasil dipulihkan dari memori.");

// Fungsi Baru: Menyiapkan Form untuk Responden Berikutnya
  function siapRespondenBaru() {
    const box = document.getElementById('statusBox');
    if (box) {
      box.style.display = 'none';
      box.innerText = ''; 
    }

    // 1. Catat START TIME baru tepat saat tombol diklik (Penting!)
    document.getElementById('startTime').value = new Date().toISOString();
    
    // 2. Sembunyikan Success Page, Tampilkan kembali form
    document.getElementById('successPage').style.display = 'none';
    document.getElementById('surveyForm').style.display = 'block';
    
    // 3. Scroll kembali ke atas
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    // 4. Refresh GPS agar lokasi responden baru lebih akurat
    initGPS();
  }

  function initGPS() {
  const btn = document.getElementById('submitBtn');
  
  if (!navigator.geolocation) {
    alert("Browser Anda tidak mendukung GPS.");
    return;
  }

  const options = {
    enableHighAccuracy: true, // Mencoba GPS Satelit
    timeout: 10000,           // Menunggu maksimal 10 detik
    maximumAge: 0
  };

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      document.getElementById('latitude').value = pos.coords.latitude;
      document.getElementById('longitude').value = pos.coords.longitude;
      btn.disabled = false;
      btn.innerText = "Kirim Data Survei";
      btn.style.background = "#2563eb"; 
    },
    (err) => {
      console.warn(`Kesalahan GPS: ${err.message}`);
      
      // Jika error karena Timeout, coba lagi dengan akurasi rendah (lebih cepat)
      if (err.code === 3) {
        btn.innerText = "Mencoba GPS Akurasi Rendah...";
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            document.getElementById('latitude').value = pos.coords.latitude;
            document.getElementById('longitude').value = pos.coords.longitude;
            btn.disabled = false;
            btn.innerText = "Kirim Data Survei (Akurasi Rendah)";
          },
          () => alert("GPS Gagal total. Silakan refresh atau pindah ke tempat terbuka."),
          { enableHighAccuracy: false, timeout: 5000 }
        );
      } else {
        alert("Akses Lokasi Ditolak. Harap izinkan GPS di pengaturan browser.");
      }
    },
    options
  );
}

  function loadPetugas() {
  const select = document.getElementById('namaPetugas');
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data || data.length === 0) {
        select.innerHTML = '<option value="">-- Data Tidak Dapat Dimuat, Pastikan Koneksi Internet Anda Stabil --</option>';
        return;
      }
      listPetugas = data;
      
      // Mengambil daftar nama unik saja untuk dropdown petugas
      let namaUnik = [...new Set(data.map(p => p.nama))];
      
      select.innerHTML = '<option value="">-- Pilih Nama PCL --</option>';
      namaUnik.forEach(nama => {
        let opt = document.createElement('option');
        opt.value = opt.innerText = nama;
        select.appendChild(opt);
      });
    })
    .getDaftarPetugas();
}
  function updateIdPetugas() {
  const nama = document.getElementById('namaPetugas').value;
  const p = listPetugas.find(x => x.nama === nama );
  
  if (p) {
    document.getElementById('idPetugas').value = p.id;
    // Reset wilayah jika ganti petugas agar tidak salah data
    document.getElementById('kecamatan').selectedIndex = 0;
    document.getElementById('wilayah').innerHTML = '<option value="">-- Pilih Desa --</option>';
    document.getElementById('sls').value = "";
  }
}

  function updateWilayah() {
    const kec = document.getElementById('kecamatan').value;
    const desSel = document.getElementById('wilayah');
    desSel.innerHTML = '<option value="">-- Pilih Desa --</option>';
    if (mappingWilayah[kec]) {
      mappingWilayah[kec].forEach(d => {
        let opt = document.createElement('option');
        opt.value = d;
        opt.innerText = d;
        desSel.appendChild(opt);
      });
    }
    document.getElementById('sls').value = "";
  document.getElementById('namaKRT').innerHTML = '<option value="">-- Pilih Desa dahulu --</option>';
  }

  // Fungsi pencarian SLS berdasarkan Nama DAN Desa
// Fungsi pencarian SLS berdasarkan Nama DAN Desa
function getSlsOtomatis() {
  const nama = document.getElementById('namaPetugas').value;
  const desa = document.getElementById('wilayah').value;
  const slsSel = document.getElementById('sls');
  slsSel.innerHTML = '<option value="">-- Pilih SLS --</option>';
  
  if (nama && desa) {
    const matches = listPetugas.filter(p => 
      p.nama.trim().toUpperCase() === nama.trim().toUpperCase() && 
      p.desa.trim().toUpperCase() === desa.trim().toUpperCase()
    );

    if (matches.length > 0) {
      // SLS tetap dibuat unik agar tidak muncul double jika baris KRT banyak
      let slsUnik = [...new Set(matches.map(m => m.sls.toString().trim()))];
      
      slsUnik.forEach(s => {
        let opt = document.createElement('option');
        opt.value = opt.innerText = s;
        slsSel.appendChild(opt);
      });

      if (slsUnik.length === 1) {
        slsSel.value = slsUnik[0];
        updateKrtDariSls();
      }
    }
  }
}
   
   // 2. Fungsi saat SLS dipilih atau terpilih otomatis
function updateKrtDariSls() {
  const kec = document.getElementById('kecamatan').value;
  const desa = document.getElementById('wilayah').value;
  const sls = document.getElementById('sls').value;
  
  if (kec && desa && sls) {
    updateListKRT(kec, desa, sls);
  }else {
    document.getElementById('namaKRT').innerHTML = '<option value="">-- Pilih SLS dahulu --</option>';
  }
}

// Fungsi untuk mengambil Nama KRT dari Spreadsheet
function updateListKRT(kec, desa, sls) {
  const krtSel = document.getElementById('namaKRT');
  krtSel.innerHTML = '<option value="">-- Memuat Nama KRT... --</option>';

  google.script.run
    .withSuccessHandler(function(data) {
      if (data && data.length > 0) {
        krtSel.innerHTML = '<option value="">-- Pilih Nama KRT --</option>';
        data.forEach(item => {
          let opt = document.createElement('option');
          opt.value = item.nama; 
          opt.innerText = item.nama;
          krtSel.appendChild(opt);
        });
      } else {
        krtSel.innerHTML = '<option value="">-- Nama KRT tidak ditemukan --</option>';
      }
    })
    .getDaftarPetugas(kec, desa, sls);
}

  function previewImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800; // Ukuran optimal
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          const dataurl = canvas.toDataURL("image/jpeg", 0.7); // Kompresi 70%
          document.getElementById('preview-img').src = dataurl;
          document.getElementById('preview-container').style.display = 'block';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
  document.getElementById('surveyForm').onsubmit = function(e) {
    e.preventDefault();
    const loader = document.getElementById('loader');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    loader.style.display = 'block';

    const file = document.getElementById('fotoRumah').files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => kirim(e.target.result);
      reader.readAsDataURL(file);
    } else {
      kirim(null);
    }
  };
  function kirim(base64) {
    const loader = document.getElementById('loader');
    const btn = document.getElementById('submitBtn');
    const form = document.getElementById('surveyForm');
    const successPage = document.getElementById('successPage');
    const respondenTadi = document.getElementById('respondenTadi');

    const bansos = Array.from(document.querySelectorAll('input[name="bansos"]:checked')).map(c => c.value).join(", ") || "Tidak Ada";
    
    const data = {
    emailPetugas: document.getElementById('emailManual').value,
    namaPetugas: document.getElementById('namaPetugas').value,
    idPetugas: document.getElementById('idPetugas').value,
    kecamatan: document.getElementById('kecamatan').value,
    wilayah: document.getElementById('wilayah').value,
    sls: document.getElementById('sls').value, // Pastikan SLS ikut terkirim
    namaKRT: document.getElementById('namaKRT').value,
    pendidikanKRT: document.getElementById('pendidikanKRT').value,
    pekerjaanKRT: document.getElementById('pekerjaanKRT').value,
    jumlahART: document.getElementById('jumlahART').value || 0,
    pendapatan: document.getElementById('pendapatan').value || 0,
    makan: document.getElementById('makan').value || 0,
    nonMakan: document.getElementById('nonMakan').value || 0,
    bansos: bansos,
    catatan: document.getElementById('catatan').value,
    latitude: document.getElementById('latitude').value,
    longitude: document.getElementById('longitude').value,
    startTime: document.getElementById('startTime').value,
    fotoFile: base64
  };

    google.script.run.withSuccessHandler(res => {
      // Sembunyikan loader
        loader.style.display = 'none';
        btn.disabled = false;
        const box = document.getElementById('statusBox');
        if(res.status === 'success') {
          localStorage.removeItem('bps_survey_draft');

          // 1. Sembunyikan Form
          form.style.display = 'none';
          
          // 2. Tampilkan Halaman Sukses
          successPage.style.display = 'block';
          
          // 3. Tampilkan nama responden yang baru diinput
          if(respondenTadi) {
            respondenTadi.innerText = "Responden: " + data.namaKRT;
          }
          
          // 4. Reset Form agar bersih untuk input selanjutnya
          form.reset();
          document.getElementById('preview-container').style.display = 'none';
          
        } else {
          box.style.display = 'block';
        box.innerText = "⚠️ " + res.message;
        
        // Otomatis scroll ke atas agar petugas melihat peringatannya
        window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      })
      .withFailureHandler(err => {
        loader.style.display = 'none';
        btn.disabled = false;
        alert("Error Koneksi: " + err.message);
      })
      .submitForm(data);
  }

  document.addEventListener('input', function(e) {
  if (e.target.closest('#surveyForm')) {
    simpanDraft(); 
  }
});

  // Fungsi untuk menyimpan seluruh data form ke memori lokal browser
function simpanDraft() {
  const form = document.getElementById('surveyForm');
  if (!form) return;

  const dataDraft = {
    emailManual: document.getElementById('emailManual').value,
    namaPetugas: document.getElementById('namaPetugas').value,
    idPetugas: document.getElementById('idPetugas').value,
    kecamatan: document.getElementById('kecamatan').value,
    wilayah: document.getElementById('wilayah').value,
    sls: document.getElementById('sls').value,
    namaKRT: document.getElementById('namaKRT').value,
    pendidikanKRT: document.getElementById('pendidikanKRT').value,
    jumlahART: document.getElementById('jumlahART').value,
    pekerjaanKRT: document.getElementById('pekerjaanKRT').value,
    pendapatan: document.getElementById('pendapatan').value,
    makan: document.getElementById('makan').value,
    nonMakan: document.getElementById('nonMakan').value,
    catatan: document.getElementById('catatan').value,
    
    // Metadata tetap disimpan agar durasi kerja akurat saat dipulihkan
    startTime: document.getElementById('startTime').value,
    latitude: document.getElementById('latitude').value,
    longitude: document.getElementById('longitude').value
  };

  localStorage.setItem('bps_survey_draft', JSON.stringify(dataDraft));
}

// OTOMATISASI: Jalankan simpanDraft setiap kali ada input di form
document.addEventListener('DOMContentLoaded', function() {
  const formInputs = document.querySelectorAll('#surveyForm input, #surveyForm select, #surveyForm textarea');
  formInputs.forEach(elemen => {
    elemen.addEventListener('input', simpanDraft);
  });
});

// Pasang pengintai (event listener) agar setiap inputan otomatis tersimpan
document.querySelectorAll('input, select, textarea').forEach(elemen => {
  elemen.addEventListener('input', simpanDraft);
  elemen.addEventListener('change', simpanDraft);
});
  
</script>
